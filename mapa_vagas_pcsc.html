<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vagas PCSC – Junho/2026 | Mapa SC</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: #e8edf2; color: #1a2a3a; }

    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ── */
    header {
      background: #1a2f4a;
      border-bottom: 3px solid #c8102e;
      padding: 10px 20px;
      display: flex; align-items: center; gap: 14px;
      flex-shrink: 0;
    }
    .header-badge {
      background: #c8102e; color: #fff;
      font-size: 10px; font-weight: 700; letter-spacing: .08em;
      padding: 3px 8px; border-radius: 3px; text-transform: uppercase;
    }
    header h1 { font-size: 15px; font-weight: 600; color: #f0f4f8; }
    header .subtitle { font-size: 11px; color: #94afc8; margin-left: auto; }

    /* ── Filter bar ── */
    #filterbar {
      background: #f0f4f8;
      border-bottom: 1px solid #c8d8e8;
      padding: 7px 18px;
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      flex-shrink: 0;
    }
    #filterbar label { font-size: 11px; color: #4a6a8a; margin-right: 2px; font-weight: 600; }
    #filterbar select, #filterbar input {
      background: #fff; color: #1a2a3a;
      border: 1px solid #b0c8dc; border-radius: 4px;
      padding: 4px 8px; font-size: 12px; cursor: pointer;
    }
    #filterbar select:focus, #filterbar input:focus { outline: none; border-color: #c8102e; }
    .filter-divider { width: 1px; height: 22px; background: #c8d8e8; }
    #btnReset {
      margin-left: auto; background: #fff; color: #4a6a8a;
      border: 1px solid #b0c8dc; border-radius: 4px;
      padding: 4px 10px; font-size: 11px; cursor: pointer;
    }
    #btnReset:hover { color: #c8102e; border-color: #c8102e; }

    /* ── Map ── */
    #map { flex: 1; z-index: 0; }

    /* ── Legend ── */
    .legend {
      background: rgba(255,255,255,0.95);
      border: 1px solid #b0c8dc;
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 11px;
      line-height: 2;
      box-shadow: 0 2px 8px rgba(26,47,74,0.12);
    }
    .legend-title { font-weight: 700; color: #c8102e; font-size: 12px; margin-bottom: 4px; }
    .legend-section { font-weight: 700; color: #4a6a8a; font-size: 10px; text-transform: uppercase; letter-spacing: .07em; margin-top: 8px; margin-bottom: 2px; }
    .legend-item { display: flex; align-items: center; gap: 8px; color: #2a4a6a; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid rgba(0,0,0,.15); flex-shrink: 0; }
    .legend-diamond { width: 10px; height: 10px; border-radius: 2px; transform: rotate(45deg); flex-shrink: 0; }
    .legend-note { font-size: 10px; color: #7a9ab8; margin-top: 4px; }

    /* ── Popup ── */
    .leaflet-popup-content-wrapper {
      background: #fff !important;
      border: 1px solid #b0c8dc !important;
      border-radius: 9px !important;
      box-shadow: 0 6px 24px rgba(26,47,74,0.18) !important;
      padding: 0 !important;
      max-width: 370px;
    }
    .leaflet-popup-tip { background: #fff !important; }
    .leaflet-popup-content { margin: 0 !important; width: auto !important; }
    .leaflet-popup-close-button { color: #7a9ab8 !important; font-size: 18px !important; right: 10px !important; top: 10px !important; }

    .popup-wrap { padding: 18px 20px 16px; }
    .popup-city { font-size: 17px; font-weight: 700; color: #1a2f4a; }
    .popup-drp  { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; margin-top: 2px; }

    .popup-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 7px; }
    .popup-tag {
      display: inline-block; border-radius: 4px;
      padding: 2px 9px; font-size: 11px; font-weight: 600;
    }
    .tag-unit   { background: #e8f0fa; color: #1a4a8a; }
    .tag-vagas  { background: #fdecea; color: #b71c1c; }
    .tag-esp    { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
    .tag-fin    { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .tag-ini    { background: #f3e5f5; color: #6a1b9a; border: 1px solid #ce93d8; }

    .popup-divider { border: none; border-top: 1px solid #e4edf5; margin: 12px 0; }

    .popup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .popup-stat { background: #f5f8fc; border-radius: 6px; padding: 9px 11px; border: 1px solid #e0eaf4; }
    .popup-stat .label { font-size: 10px; color: #7a9ab8; text-transform: uppercase; letter-spacing: .06em; }
    .popup-stat .value { font-size: 20px; font-weight: 700; line-height: 1.2; margin-top: 2px; }
    .popup-stat .sub   { font-size: 10px; color: #9ab8d0; }
    .stat-ip   .value { color: #c62828; }
    .stat-apf  .value { color: #1565c0; }
    .stat-tc   .value { color: #2e7d32; }
    .stat-total .value { color: #e65100; }

    .popup-section { margin-top: 12px; }
    .popup-section-title { font-size: 10px; color: #c8102e; text-transform: uppercase; letter-spacing: .09em; font-weight: 700; margin-bottom: 7px; }
    .popup-row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; border-bottom: 1px solid #edf2f7; }
    .popup-row:last-child { border-bottom: none; }
    .popup-row .k { color: #7a9ab8; }
    .popup-row .v { color: #1a2f4a; font-weight: 500; text-align: right; max-width: 60%; }

    /* Tooltip */
    .leaflet-tooltip {
      background: #1a2f4a !important;
      border: 1px solid #2a4a6a !important;
      color: #f0f4f8 !important;
      font-size: 11px !important;
      font-weight: 600 !important;
      border-radius: 4px !important;
      padding: 3px 8px !important;
      box-shadow: 0 2px 6px rgba(0,0,0,.2) !important;
    }
  </style>
</head>

<div id="app">

  <header>
    <div class="header-badge">PCSC</div>
    <h1>Vagas – Processo de Movimentação Junho/2026 &nbsp;·&nbsp; Santa Catarina</h1>
    <span class="subtitle">31 vagas &nbsp;|&nbsp; 25 municípios</span>
  </header>

  <div id="filterbar">
    <label>Diretoria</label>

    <div class="filter-divider"></div>

    <label>Tipo de Unidade</label>

      <option>CPP</option><option>DEAM</option>

    <div class="filter-divider"></div>

    <label>Entrância</label>

      <option value="">Todas</option>
      <option>Especial</option><option>Final</option><option>Inicial</option>
    </select>

    <div class="filter-divider"></div>

    <label>Buscar cidade</label>
    <input id="search" type="text" placeholder="ex: Laguna…" style="width:130px" />

    <button id="btnReset">✕ Limpar filtros</button>
  </div>

  <div id="map"></div>
</div>

const DIR_COLORS = {
  DIFRON:"#f97316", DPGF:"#3b82f6", DPOI:"#a855f7", DPOL:"#10b981", DPSUL:"#ef4444"
};
const ENT_COLORS = { Especial:"#e65100", Final:"#2e7d32", Inicial:"#6a1b9a" };
const ENT_TAG    = { Especial:"tag-esp", Final:"tag-fin", Inicial:"tag-ini" };

function createMarkerIcon(city) {
  const color = DIR_COLORS[city.diretoria] || "#64748b";
  const base  = 13;
  const size  = city.vagas > 1 ? base + city.vagas * 3 : base;
  const ring  = city.vagas > 1
    ? `box-shadow:0 0 0 3px ${color}66,0 0 10px ${color}44;` : "";
  return L.divIcon({
    html: `<div style="width:${size}px;height:${size}px;background:${color};
             border-radius:50%;border:2.5px solid #fff;${ring}"></div>`,
    className:"", iconSize:[size,size],
    iconAnchor:[size/2,size/2], popupAnchor:[0,-size/2-4]
  });
}

function popupHtml(c) {
  const total = c.ip + c.apf + c.tc;
  const color = DIR_COLORS[c.diretoria] || "#64748b";
  const etag  = ENT_TAG[c.entrancia] || "";
  return `
  <div class="popup-wrap">
    <div class="popup-city">${c.name}</div>
    <div class="popup-drp" style="color:${color}">${c.diretoria} &nbsp;·&nbsp; ${c.drp}</div>
    <div class="popup-tags">
      <span class="popup-tag tag-unit">${c.unit}</span>
      <span class="popup-tag tag-vagas">${c.vagas} vaga${c.vagas>1?"s":""}</span>
      <span class="popup-tag ${etag}">Entrância ${c.entrancia}</span>
    </div>

    <hr class="popup-divider"/>

    <div style="font-size:10px;color:#7a9ab8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;font-weight:700;">Procedimentos</div>
    <div class="popup-grid">
      <div class="popup-stat stat-ip">
        <div class="label">IP</div>
        <div class="value">${c.ip.toLocaleString("pt-BR")}</div>
        <div class="sub">Inquéritos Policiais</div>
      </div>
      <div class="popup-stat stat-apf">
        <div class="label">APF</div>
        <div class="value">${c.apf.toLocaleString("pt-BR")}</div>
        <div class="sub">Auto Prisão em Flagrante</div>
      </div>
      <div class="popup-stat stat-tc">
        <div class="label">TC</div>
        <div class="value">${c.tc.toLocaleString("pt-BR")}</div>
        <div class="sub">Termos Circunstanciados</div>
      </div>
      <div class="popup-stat stat-total">
        <div class="label">Total</div>
        <div class="value">${total.toLocaleString("pt-BR")}</div>
        <div class="sub">Procedimentos</div>
      </div>
    </div>

    <hr class="popup-divider"/>

    <div class="popup-section">
      <div class="popup-section-title">Dados Socioeconômicos</div>
      <div class="popup-row"><span class="k">População</span><span class="v">${c.pop} hab.</span></div>
      <div class="popup-row"><span class="k">IDH Municipal</span><span class="v">${c.idh}</span></div>
      <div class="popup-row"><span class="k">Região</span><span class="v">${c.regiao}</span></div>
      <div class="popup-row"><span class="k">Cidade polo</span><span class="v">${c.cidadePolo}</span></div>
      <div class="popup-row"><span class="k">Dist. Florianópolis</span><span class="v">${c.distFln}</span></div>
      <div class="popup-row"><span class="k">Aeroporto mais próximo</span><span class="v">${c.aeroporto}</span></div>
    </div>
  </div>`;
}

// ── MAP ───────────────────────────────────────────────────────────────────────
const map = L.map("map", { center:[-27.5,-50.5], zoom:7 });

// Tile layer: light, clean cartographic style
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution:"&copy; OpenStreetMap &copy; CARTO", maxZoom:18
}).addTo(map);

// SC municipalities — fill only, no internal borders
L.geoJSON(SC_GEOJSON, {
  style: {
    color:"transparent",
    weight: 0,
    fillColor:"#c8dff0",
    fillOpacity: 0.22
  }
}).addTo(map);

// SC outer border only — thin, clean contour
L.geoJSON(SC_GEOJSON, {
  style: {
    color:"#1a2f4a",
    weight: 1.2,
    opacity: 0.55,
    fillOpacity: 0
  }
}).addTo(map);

// ── MARKERS ───────────────────────────────────────────────────────────────────
let markers = [];

function renderMarkers(data) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  data.forEach(c => {
    const m = L.marker([c.lat, c.lon], { icon:createMarkerIcon(c) })
      .addTo(map)
      .bindPopup(popupHtml(c), { maxWidth:370, minWidth:310 })
      .bindTooltip(c.name, { sticky:false, direction:"top", offset:[0,-4] });
    markers.push(m);
  });
}

renderMarkers(CITIES);

// ── LEGEND ────────────────────────────────────────────────────────────────────
const legend = L.control({ position:"bottomright" });
legend.onAdd = () => {
  const div = L.DomUtil.create("div","legend");
  div.innerHTML = `
    <div class="legend-title">Diretoria</div>
    ${Object.entries(DIR_COLORS).map(([k,v])=>`
      <div class="legend-item">
        <div class="legend-dot" style="background:${v}"></div>${k}
      </div>`).join("")}
    <div class="legend-section">Entrância</div>
    ${Object.entries(ENT_COLORS).map(([k,v])=>`
      <div class="legend-item">
        <div class="legend-dot" style="background:${v}"></div>${k}
      </div>`).join("")}
    <div class="legend-note">● Tamanho = nº de vagas</div>`;
  return div;
};
legend.addTo(map);

// ── FILTERS ───────────────────────────────────────────────────────────────────
function applyFilters() {
  const dir = document.getElementById("selDir").value;
  const unit= document.getElementById("selUnit").value;
  const ent = document.getElementById("selEnt").value;
  const q   = document.getElementById("search").value.toLowerCase().trim();
  renderMarkers(CITIES.filter(c =>
    (!dir  || c.diretoria === dir) &&
    (!unit || c.unit === unit) &&
    (!ent  || c.entrancia === ent) &&
    (!q    || c.name.toLowerCase().includes(q))
  ));
}

["selDir","selUnit","selEnt"].forEach(id =>
  document.getElementById(id).addEventListener("change", applyFilters));
document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("btnReset").addEventListener("click", () => {
  ["selDir","selUnit","selEnt"].forEach(id => document.getElementById(id).value="");
  document.getElementById("search").value="";
  renderMarkers(CITIES);
});
</script>
